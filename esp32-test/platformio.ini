[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

monitor_speed = 115200
upload_speed = 115200


monitor_filters = direct
monitor_rts = 0
monitor_dtr = 0

lib_deps =
    keypad
    git+https://github.com/joeyoung/arduino_keypads.git#master
    alvarowolfx/ESP32QRCodeReader
    robtillaart/PCF8574